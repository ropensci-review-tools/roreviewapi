version: "3.7"
services:
  nginx:
    image: nginx
    volumes:
      - $PWD/nginx.conf:/tmp/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - PLUMBER_SERVER_ADDR=plumber:8000
      - NGINX_SERVER_NAME=reviewbot.ropensci.org
    command: /bin/bash -c "envsubst '$${PLUMBER_SERVER_ADDR} $${NGINX_SERVER_NAME}' < /tmp/nginx.conf > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - 80:80
      - 443:443
    depends_on:
      plumber:
        condition: service_healthy
  plumber:
    build: .
    restart: always
    volumes:
      - /srv/roreviewapi/data:/data/email
    environment:
      - ROREVIEWAPI_EMAIL_DB=/data/email/searches.sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
